<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM 4</title>
    <style>

    </style>
</head>
<body>
    <p class="minhaClasse">Meu parágrafo</p>
    <button id="meuBotao" onclick="mudarCor()">Mudar cor</button>

    <script>
        let cores= ["red", "green", "yellow","pink", "gray"];
        let indiceCor = 0; //Índice da cor atual no array

        function mudarCor(){
            //acessa o elemento pelo celetor CSS
            let p= document.querySelector(".minhaClasse");
            //altera a cor do texto do elemento
            p.style.color= cores[indiceCor];
            //atualizar o índice da cor para a próxima do array
            indiceCor = (indiceCor+1) % cores.length;
        }
        //GERALMENTE SE USA ISSO PARA MODO CLARO E ESCURO NOS SITES
    </script>
</body>
</html>
